<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sBITX Logs</title>
<style>
:root { color-scheme: dark; }
body { background:#000; color:#0ff; font-family:Helvetica,sans-serif; margin:0; padding:10px; }
h2 { color:#fff; margin:5px 0; }
.tabbar button, .toolbar a, .toolbar button {
  background:#0c2333; color:#fff; border:1px solid #333; padding:10px 14px;
  margin:2px; cursor:pointer; font-size:14px; text-decoration:none; display:inline-block; border-radius:6px;
}
.tabbar button.active { background:#049117; }
.toolbar input { background:#000; color:#fff; border:1px solid #555; padding:9px; font-size:14px; margin:2px; border-radius:6px; }
.chip { display:inline-block; padding:9px 13px; background:#0c2333; border:1px solid #333; color:#fff;
  cursor:pointer; margin:2px; border-radius:6px; font-size:13px; user-select:none; }
.chip.on { background:#049117; }
table { border-collapse:collapse; width:100%; font-family:courier,monospace; font-size:12px; margin-top:8px; }
th { color:#fff; text-align:left; border-bottom:1px solid #555; padding:3px 6px; position:sticky; top:0; background:#000; }
td { padding:2px 6px; border-bottom:1px solid #1a1a1a; white-space:nowrap; }
tr.tx td { color:orange; }
tr.qso td { color:#7CFC00; }
#tablewrap { max-height:64vh; overflow:auto; border:1px solid #333; }
.sess { border:1px solid #333; margin:8px 0; padding:8px; border-radius:8px; cursor:pointer; }
.sess:hover { border-color:#0af; }
.sess h3 { color:#fff; margin:2px 0; }
.count { color:#888; font-size:12px; margin-left:10px; }
#status { color:yellow; }
#sessbanner { display:none; background:#123a12; border:1px solid #2a2; color:#fff;
  padding:8px 12px; margin:4px 0; border-radius:6px; }
.cards { display:flex; flex-wrap:wrap; gap:6px; margin:6px 0; }
.card { background:#071827; border:1px solid #234; border-radius:8px; padding:8px 14px; min-width:88px; }
.card b { display:block; font-size:20px; color:#fff; }
.card span { font-size:11px; color:#8ab; }
.bar { background:#0a5; height:12px; display:inline-block; vertical-align:middle; }
.rept td, .rept th { border-bottom:1px solid #222; }
</style>
</head>
<body>
<h2>sBITX Logs <span class="count" id="counts"></span></h2>
<div class="tabbar">
  <button id="tab-qso" class="active" onclick="show('qso')">QSOs</button>
  <button id="tab-dec" onclick="show('dec')">Decodes</button>
  <button id="tab-missed" onclick="show('missed')">Missed CQs</button>
  <button id="tab-report" onclick="show('report')">Report</button>
  <button id="tab-sess" onclick="show('sess')">Sessions</button>
  <a class="chip" href="/map.html">&#127758; MAP</a>
</div>
<div class="toolbar">
  <input id="search" placeholder="search call / grid / country / text" oninput="render()">
  <input type="date" id="dfrom" onchange="render()">
  <input type="date" id="dto" onchange="render()">
  <span class="chip" onclick="quick(0)">Today</span>
  <span class="chip" onclick="quick(1)">Yesterday</span>
  <span class="chip" onclick="quick(7)">7 days</span>
  <span class="chip" onclick="quick(30)">30 days</span>
  <span class="chip" onclick="quick(-1)">All</span>
</div>
<div class="toolbar" id="bandchips"></div>
<div class="toolbar">
  <span class="chip dirc on" data-dir="" onclick="setdir('')">rx+tx</span>
  <span class="chip dirc" data-dir="RX" onclick="setdir('RX')">RX only</span>
  <span class="chip dirc" data-dir="TX" onclick="setdir('TX')">TX only</span>
  <span class="chip dirc" data-dir="TXEND" onclick="setdir('TXEND')">TX power</span>
  <a href="/data/qso_log.csv" download>QSO csv</a>
  <a href="/data/ft8_decodes.csv" download>Decodes csv</a>
  <button onclick="backup()">Backup (zip)</button>
  <span class="chip" onclick="document.getElementById('fup').click()">&#128194; Load your log files</span>
  <span class="chip" id="radiochip" style="display:none" onclick="radioData()">&#8635; back to radio data</span>
  <input type="file" id="fup" multiple style="display:none" accept=".adi,.adif,.txt,.csv,.log">
  <span id="upinfo" style="color:#ff0;font-size:12px"></span>
  <span id="status"></span>
</div>
<div id="sessbanner"><span id="sesslabel"></span>
  <span class="chip" onclick="clearSession()">&#10005; clear session filter</span></div>
<div id="tablewrap"><table id="tbl"></table></div>
<div id="sessions" style="display:none"></div>
<script src="hamlog.js"></script>
<script>
var qso = [], dec = [], sess = [], tab = 'qso', uploaded = false;
var BANDS = ['80m','40m','30m','20m','17m','15m','12m','10m'];
var band = '', dir = '', sessWin = null;

var bc = '<span class="chip bandc on" data-b="" onclick="setband(\'\')">all bands</span>';
BANDS.forEach(function(b){ bc += '<span class="chip bandc" data-b="' + b + '" onclick="setband(\'' + b + '\')">' + b + '</span>'; });
document.getElementById('bandchips').innerHTML = bc;

function setband(b){
  band = b;
  document.querySelectorAll('.bandc').forEach(function(e){ e.className = 'chip bandc' + (e.dataset.b == b ? ' on' : ''); });
  render();
}
function setdir(d){
  dir = d;
  document.querySelectorAll('.dirc').forEach(function(e){ e.className = 'chip dirc' + (e.dataset.dir == d ? ' on' : ''); });
  render();
}
function isoDay(offset){
  var d = new Date(Date.now() - offset * 864e5);
  return d.toISOString().slice(0, 10);
}
function quick(days){
  var f = document.getElementById('dfrom'), t = document.getElementById('dto');
  if (days < 0){ f.value = ''; t.value = ''; }
  else if (days == 0){ f.value = isoDay(0); t.value = isoDay(0); }
  else if (days == 1){ f.value = isoDay(1); t.value = isoDay(1); }
  else { f.value = isoDay(days); t.value = isoDay(0); }
  render();
}

function csv(line){
  var out = [], cur = '', q = false;
  for (var i = 0; i < line.length; i++){
    var c = line[i];
    if (q){ if (c == '"') q = false; else cur += c; }
    else if (c == '"') q = true;
    else if (c == ','){ out.push(cur); cur = ''; }
    else cur += c;
  }
  out.push(cur);
  return out;
}
function load(url, cb){
  fetch(url + '?t=' + Date.now()).then(function(r){ return r.ok ? r.text() : ''; })
    .then(function(t){ cb(t ? t.trim().split('\n').map(csv) : []); refresh(); })
    .catch(function(){ cb([]); refresh(); });
}
function refresh(){
  document.getElementById('counts').textContent =
    qso.length + ' QSOs, ' + dec.length + ' decodes, ' + sess.length + ' session events';
  render();
}
function show(t){
  tab = t;
  ['qso','dec','sess','missed','report'].forEach(function(x){
    document.getElementById('tab-' + x).className = (x == t) ? 'active' : '';
  });
  document.getElementById('tablewrap').style.display = (t == 'sess' || t == 'report') ? 'none' : 'block';
  document.getElementById('sessions').style.display = (t == 'sess' || t == 'report') ? 'block' : 'none';
  render();
}

// ---- shared filters: date range, session window, band, search ----
function tsOf(r, dateIdx, timeIdx){ return r[dateIdx] + ' ' + r[timeIdx]; }
function inWindow(ts, dateStr){
  var f = document.getElementById('dfrom').value, t = document.getElementById('dto').value;
  if (f && dateStr < f) return false;
  if (t && dateStr > t) return false;
  if (sessWin && (ts < sessWin.t0 || ts >= sessWin.t1)) return false;
  return true;
}
function qsoFiltered(){
  var f = document.getElementById('search').value.toUpperCase();
  return qso.filter(function(r){
    if (r.length < 11) return false;
    if (!inWindow(tsOf(r,0,1), r[0])) return false;
    if (band && r[2] != band) return false;
    if (f && r.join(' ').toUpperCase().indexOf(f) < 0) return false;
    return true;
  });
}
function decFiltered(useDir){
  var f = document.getElementById('search').value.toUpperCase();
  return dec.filter(function(r){
    if (r.length < 9) return false;
    if (!inWindow(tsOf(r,0,1), r[0])) return false;
    if (band && r[3] != band) return false;
    if (useDir && dir && r[2] != dir) return false;
    if (f && r.join(' ').toUpperCase().indexOf(f) < 0) return false;
    return true;
  });
}
function clearSession(){
  sessWin = null;
  document.getElementById('sessbanner').style.display = 'none';
  render();
}
function useSession(t0, t1, label, gotoTab){
  sessWin = {t0:t0, t1:t1};
  document.getElementById('sesslabel').textContent = 'Showing only session: ' + label + ' ';
  document.getElementById('sessbanner').style.display = 'block';
  show(gotoTab || 'qso');
}

function decode_msg(r){ return r.length >= 11 ? r[10] : (r.length >= 9 ? r[8] : ''); }
function cq_caller(msg){
  if (msg.indexOf('CQ ') != 0) return null;
  var t = msg.split(/\s+/);
  for (var i = 1; i < t.length && i < 4; i++)
    if (/\d/.test(t[i]) && t[i].length >= 3 && t[i].indexOf('<') < 0) return t[i];
  return null;
}
function ago(ts){
  var d = new Date(ts.replace(' ', 'T') + 'Z');
  var s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 90) return s + 's ago';
  if (s < 5400) return Math.round(s / 60) + 'min ago';
  if (s < 172800) return (s / 3600).toFixed(1) + 'h ago';
  return Math.round(s / 86400) + 'd ago';
}

function renderMissed(){
  var worked = {};
  qso.forEach(function(r){ if (r.length > 4) worked[r[4]] = 1; });
  var seen = {};
  decFiltered(false).forEach(function(r){
    if (r[2] != 'RX') return;
    var call = cq_caller(decode_msg(r));
    if (!call || worked[call]) return;
    if (!seen[call]) seen[call] = {call: call, count: 0};
    var s = seen[call];
    s.count++; s.ts = r[0] + ' ' + r[1]; s.band = r[3]; s.snr = r[6];
  });
  var rows = Object.keys(seen).map(function(k){ return seen[k]; })
    .sort(function(a, b){ return a.ts < b.ts ? 1 : -1; });
  var h = '<tr><th>call</th><th>last heard (UTC)</th><th>how long ago</th><th>band</th><th>snr</th><th>CQs heard</th></tr>';
  h += rows.slice(0, 800).map(function(r){
    return '<tr class="qso"><td>' + r.call + '</td><td>' + r.ts + '</td><td>' + ago(r.ts)
      + '</td><td>' + r.band + '</td><td>' + r.snr + '</td><td>' + r.count + '</td></tr>';
  }).join('');
  document.getElementById('tbl').innerHTML = h;
  document.getElementById('counts').textContent = rows.length + ' stations called CQ and were not worked';
}

// ---- the Report tab: general report of whatever the filters select ----
function renderReport(){
  var box = document.getElementById('sessions');
  var q = qsoFiltered(), d = decFiltered(false);
  var scope = sessWin ? 'this session' :
    (document.getElementById('dfrom').value || document.getElementById('dto').value) ? 'selected dates' : 'all data';

  var stations = {}, grids = {}, countries = {}, days = {}, perBand = {}, perHour = {};
  d.forEach(function(r){
    if (r[2] != 'RX') return;
    var m = decode_msg(r).split(/\s+/);
    var caller = m.length >= 2 ? (m[0] == 'CQ' ? m[m.length-2] : m[1]) : null;
    if (caller && /\d/.test(caller)) stations[caller] = 1;
    var g = m[m.length-1];
    if (/^[A-R]{2}[0-9]{2}$/.test(g)) grids[g] = 1;
    if (!perBand[r[3]]) perBand[r[3]] = {dec:0, qso:0};
    perBand[r[3]].dec++;
    days[r[0]] = days[r[0]] || {dec:0, qso:0}; days[r[0]].dec++;
    perHour[r[1].slice(0,2)] = (perHour[r[1].slice(0,2)] || 0) + 1;
  });
  q.forEach(function(r){
    countries[r[8]] = (countries[r[8]] || 0) + 1;
    if (!perBand[r[2]]) perBand[r[2]] = {dec:0, qso:0};
    perBand[r[2]].qso++;
    days[r[0]] = days[r[0]] || {dec:0, qso:0}; days[r[0]].qso++;
  });
  var uq = {}; q.forEach(function(r){ uq[r[4]] = 1; });
  var pw = q.map(function(r){ return r[9]/10; }).filter(function(x){ return x > 0; });
  var avgPw = pw.length ? (pw.reduce(function(a,b){ return a+b; }, 0) / pw.length).toFixed(1) : '-';

  function card(v, k){ return '<div class="card"><b>' + v + '</b><span>' + k + '</span></div>'; }
  var h = '<h3 style="color:#fff">Report — ' + scope + '</h3><div class="cards">'
    + card(q.length, 'QSOs') + card(Object.keys(uq).length, 'unique calls worked')
    + card(Object.keys(countries).length, 'countries')
    + card(Object.keys(stations).length, 'stations heard')
    + card(Object.keys(grids).length, 'grids heard')
    + card(d.filter(function(r){ return r[2] == 'TX'; }).length, 'transmissions')
    + card(avgPw + ' W', 'avg TX power') + '</div>';

  h += '<table class="rept" style="max-width:560px"><tr><th>band</th><th>QSOs</th><th>decodes</th></tr>';
  BANDS.forEach(function(b){
    if (!perBand[b]) return;
    h += '<tr><td>' + b + '</td><td>' + perBand[b].qso + '</td><td>' + perBand[b].dec + '</td></tr>';
  });
  h += '</table>';

  var dk = Object.keys(days).sort().reverse();
  h += '<h3 style="color:#fff">Per day</h3><table class="rept" style="max-width:560px"><tr><th>date</th><th>QSOs</th><th>decodes</th></tr>';
  dk.slice(0, 31).forEach(function(k){
    h += '<tr><td>' + k + '</td><td>' + days[k].qso + '</td><td>' + days[k].dec + '</td></tr>';
  });
  h += '</table>';

  var ck = Object.keys(countries).sort(function(a,b){ return countries[b]-countries[a]; });
  if (ck.length){
    h += '<h3 style="color:#fff">Countries</h3><div>'
      + ck.map(function(c){ return c + ' (' + countries[c] + ')'; }).join(', ') + '</div>';
  }

  var maxH = 1;
  Object.keys(perHour).forEach(function(k){ if (perHour[k] > maxH) maxH = perHour[k]; });
  h += '<h3 style="color:#fff">Activity by hour (UTC, decodes)</h3><table class="rept" style="max-width:560px">';
  for (var hh = 0; hh < 24; hh++){
    var k = ('0' + hh).slice(-2), v = perHour[k] || 0;
    h += '<tr><td>' + k + 'z</td><td style="width:80%"><span class="bar" style="width:' + Math.round(100*v/maxH) + '%"></span> ' + (v || '') + '</td></tr>';
  }
  h += '</table>';

  h += sessionEfficiencyBlock();
  box.innerHTML = h;
  document.getElementById('counts').textContent = '';
}

function sessionEfficiencyBlock(){
  var t0 = null;
  sess.forEach(function(r){ if (r[0] == 'START') t0 = r[1]; });
  var d = dec.filter(function(r){ return !t0 || (r[0] + ' ' + r[1]) >= t0; });
  var q = qso.filter(function(r){ return !t0 || (r[0] + ' ' + r[1]) >= t0; });
  if (!d.length) return '';
  var first = d[0][0] + ' ' + d[0][1], last = d[d.length-1][0] + ' ' + d[d.length-1][1];
  var durS = (new Date(last.replace(' ','T')+'Z') - new Date(first.replace(' ','T')+'Z')) / 1000;
  if (durS < 60) durS = 60;
  var cqs = {}, workable = {};
  d.forEach(function(r){
    if (r[2] != 'RX') return;
    var c = cq_caller(decode_msg(r));
    if (!c) return;
    cqs[c] = 1;
    if (parseInt(r[6]) >= -20) workable[c] = 1;
  });
  var att = {};
  d.forEach(function(r){
    if (r[2] != 'TX') return;
    var t = decode_msg(r).split(/\s+/)[0];
    if (t && t != 'CQ') att[t] = 1;
  });
  var firstTx = {};
  d.forEach(function(r){
    if (r[2] != 'TX') return;
    var t = decode_msg(r).split(/\s+/)[0];
    if (t && t != 'CQ' && !firstTx[t]) firstTx[t] = r[0] + ' ' + r[1];
  });
  var qsoTimes = [];
  q.forEach(function(r){
    var c = r[4];
    if (firstTx[c]){
      var dt = (new Date((r[0]+' '+r[1]).replace(' ','T')+'Z') - new Date(firstTx[c].replace(' ','T')+'Z')) / 1000;
      if (dt > 0 && dt < 1800) qsoTimes.push(dt);
    }
  });
  var avgQ = qsoTimes.length ? qsoTimes.reduce(function(a,b){return a+b;},0) / qsoTimes.length : 0;
  var nTx = d.filter(function(r){ return r[2] == 'TX'; }).length;
  var txS = nTx * 13.5, IDEAL = 90;
  var nWorkable = Object.keys(workable).length;
  var capacity = Math.min(nWorkable, Math.floor(durS / IDEAL));
  function line(k, v){ return '<div><span style="color:#888">' + k + ':</span> <b>' + v + '</b></div>'; }
  return '<div class="sess" style="cursor:default"><h3>Current session efficiency (since ' + (t0 || 'start of logs') + ' UTC)</h3>'
    + line('Session length', (durS/60).toFixed(0) + ' min')
    + line('Stations heard calling CQ', Object.keys(cqs).length + ' (' + nWorkable + ' workable at snr &ge; -20)')
    + line('Stations you attempted', Object.keys(att).length)
    + line('QSOs completed', q.length)
    + line('Realistic capacity', capacity + ' QSOs at ~' + IDEAL + 's per clean QSO')
    + line('Efficiency vs capacity', capacity ? Math.round(100*q.length/capacity) + '%' : '-')
    + line('Average QSO time', avgQ ? avgQ.toFixed(0) + ' s (' + (avgQ/15).toFixed(1) + ' slots)' : 'no completed QSOs yet')
    + line('TX airtime', (txS/60).toFixed(1) + ' min = ' + Math.round(100*txS/durS) + '% of session (' + nTx + ' transmissions)')
    + '</div>';
}

function render(){
  if (tab == 'sess') return renderSessions();
  if (tab == 'report') return renderReport();
  if (tab == 'missed') return renderMissed();
  var tbl = document.getElementById('tbl');
  var head, rows;
  if (tab == 'qso'){
    head = ['date','utc','band','dial','call','grid','sent','recv','country','W','SWR'];
    rows = qsoFiltered().map(function(r){
      return {cls:'qso', c:[r[0],r[1],r[2],(r[3]/1000).toFixed(1),r[4],r[5],r[6],r[7],r[8],(r[9]/10).toFixed(1),(r[10]/10).toFixed(1)]};
    });
  } else {
    head = ['date','utc','dir','band','dial kHz','snr','df','W','SWR','message'];
    rows = decFiltered(true).map(function(r){
      if (r.length >= 11) return {cls:(r[2]!='RX'?'tx':''), c:[r[0],r[1],r[2],r[3],(r[4]/1000).toFixed(1),r[6],r[7],r[8]>0?(r[8]/10).toFixed(1):'',r[9]>0?(r[9]/10).toFixed(1):'',r[10]]};
      return {cls:(r[2]!='RX'?'tx':''), c:[r[0],r[1],r[2],r[3],(r[4]/1000).toFixed(1),r[6],r[7],'','',r[8]]};
    });
  }
  var h = '<tr>' + head.map(function(x){ return '<th>' + x + '</th>'; }).join('') + '</tr>';
  h += rows.slice(-2000).reverse().map(function(r){
    return '<tr class="' + r.cls + '">' + r.c.map(function(x){ return '<td>' + String(x).replace(/</g,'&lt;') + '</td>'; }).join('') + '</tr>';
  }).join('');
  tbl.innerHTML = h;
  document.getElementById('counts').textContent = rows.length + ' rows' + (sessWin ? ' (session filter on)' : '');
}

function renderSessions(){
  var box = document.getElementById('sessions');
  var starts = [];
  sess.forEach(function(r){ if (r[0] == 'START') starts.push({ts:r[1], info:r[2], meta:[]});
    else if (r[0] == 'META' && starts.length) starts[starts.length-1].meta.push(r[1] + ' ' + r[2]); });
  var h = '<div style="color:#888;margin:4px 0">Tap a session to see only its QSOs; use the buttons for decodes or a full report.</div>';
  for (var i = starts.length - 1; i >= 0; i--){
    var s = starts[i];
    var end = (i + 1 < starts.length) ? starts[i + 1].ts : '9999';
    var q = qso.filter(function(r){ return (r[0] + ' ' + r[1]) >= s.ts && (r[0] + ' ' + r[1]) < end; });
    var d = dec.filter(function(r){ return (r[0] + ' ' + r[1]) >= s.ts && (r[0] + ' ' + r[1]) < end; });
    var bands = {}, countries = {}, att = {};
    q.forEach(function(r){ bands[r[2]] = 1; countries[r[8]] = 1; });
    d.forEach(function(r){ bands[r[3]] = 1;
      if (r[2] == 'TX'){ var t = decode_msg(r).split(/\s+/)[0]; if (t && t != 'CQ') att[t] = 1; } });
    var durMin = d.length ? Math.round((new Date((d[d.length-1][0]+' '+d[d.length-1][1]).replace(' ','T')+'Z')
      - new Date((d[0][0]+' '+d[0][1]).replace(' ','T')+'Z')) / 60000) : 0;
    h += '<div class="sess" onclick="useSession(\'' + s.ts + '\',\'' + end + '\',\'' + s.ts + '\',\'qso\')">'
      + '<h3>&#9654; ' + s.ts + ' UTC — ' + (s.info || '') + '</h3>'
      + '<div>' + durMin + ' min, <b>' + q.length + ' QSOs</b>, ' + Object.keys(att).length + ' attempted, '
      + d.length + ' decode lines, bands: ' + Object.keys(bands).join(' ')
      + (q.length ? ', countries: ' + Object.keys(countries).join(', ') : '') + '</div>'
      + (s.meta.length ? '<div style="color:#888">' + s.meta.map(function(m){ return m.replace(/</g,'&lt;'); }).join('<br>') + '</div>' : '')
      + '<div style="margin-top:6px">'
      + '<span class="chip" onclick="event.stopPropagation();useSession(\'' + s.ts + '\',\'' + end + '\',\'' + s.ts + '\',\'qso\')">QSOs</span>'
      + '<span class="chip" onclick="event.stopPropagation();useSession(\'' + s.ts + '\',\'' + end + '\',\'' + s.ts + '\',\'dec\')">Decodes</span>'
      + '<span class="chip" onclick="event.stopPropagation();useSession(\'' + s.ts + '\',\'' + end + '\',\'' + s.ts + '\',\'report\')">Report</span>'
      + '</div></div>';
  }
  box.innerHTML = h || 'No sessions recorded yet';
}

function backup(){
  document.getElementById('status').textContent = ' building backup...';
  fetch('/rest?do=backup').then(function(r){ return r.text(); }).then(function(){
    setTimeout(function(){
      document.getElementById('status').innerHTML = ' <a href="/backup.tgz" download style="color:yellow">download backup.tgz</a>';
    }, 10000);
  });
}

// ---- bring your own logs: ADIF / WSJT-X ALL.TXT / sBITX csv ----
function radioData(){
  uploaded = false;
  document.getElementById('upinfo').textContent = '';
  document.getElementById('radiochip').style.display = 'none';
  reloadCsvs();
}
document.getElementById('fup').addEventListener('change', function(ev){
  var files = Array.prototype.slice.call(ev.target.files);
  if (!files.length) return;
  var nq = [], nd = [], ns = [], loaded = [], pending = files.length;
  files.forEach(function(file){
    var rd = new FileReader();
    rd.onload = function(){
      var text = rd.result || '';
      var kind = hamlogSniff(file.name, text);
      if (kind == 'adif') nq = nq.concat(parseADIF(text).rows);
      else if (kind == 'alltxt') nd = nd.concat(parseALLTXT(text));
      else if (kind == 'qsocsv') nq = nq.concat(text.trim().split('\n').map(csv));
      else if (kind == 'deccsv') nd = nd.concat(text.trim().split('\n').map(csv));
      else if (kind == 'sesscsv') ns = ns.concat(text.trim().split('\n').map(csv));
      loaded.push(file.name + (kind ? '' : ' (unrecognized)'));
      if (--pending == 0){
        uploaded = true;
        if (nq.length) qso = nq;
        if (nd.length) dec = nd;
        if (ns.length) sess = ns;
        document.getElementById('upinfo').textContent = 'showing: ' + loaded.join(', ');
        document.getElementById('radiochip').style.display = 'inline-block';
        refresh();
      }
    };
    rd.readAsText(file);
  });
  ev.target.value = '';
});

function reloadCsvs(){
  if (uploaded) return;
  load('/data/qso_log.csv', function(r){ qso = r; });
  load('/data/ft8_decodes.csv', function(r){ dec = r; });
  load('/data/sessions.csv', function(r){ sess = r; });
}
if (location.hash && document.getElementById('tab-' + location.hash.slice(1)))
  show(location.hash.slice(1));
reloadCsvs();
setInterval(reloadCsvs, 30000);
</script>
